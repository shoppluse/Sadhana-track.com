<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prank Question 😈</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --yes-w: 140px;
      --yes-h: 56px;
      --no-w: 140px;
      --no-h: 56px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff6ec7, #6a5cff, #00d4ff);
      background-size: 300% 300%;
      animation: bgMove 10s ease infinite;
      color: #fff;
      user-select: none;
      position: relative;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      position: relative;
      width: min(90vw, 700px);
      min-height: 380px;
      padding: 30px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      line-height: 1.15;
      text-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    .subtitle {
      margin-top: 12px;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      opacity: 0.95;
      font-weight: 600;
    }

    .buttons-zone {
      position: relative;
      width: 100%;
      height: 190px;
      margin-top: 34px;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      width: 140px;
      height: 56px;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
      position: absolute;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .btn:active {
      transform: scale(0.97);
    }

    #yesBtn {
      left: calc(50% - 160px);
      top: 70px;
      background: linear-gradient(135deg, #1dd1a1, #10ac84);
      color: #fff;
    }

    #yesBtn:hover {
      box-shadow: 0 12px 28px rgba(16, 172, 132, 0.45);
    }

    #noBtn {
      left: calc(50% + 20px);
      top: 70px;
      background: linear-gradient(135deg, #ff4d6d, #ff6b81);
      color: #fff;
    }

    #noBtn:hover {
      box-shadow: 0 12px 28px rgba(255, 77, 109, 0.45);
    }

    .shake {
      animation: shake 0.22s ease;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    .hidden {
      display: none !important;
    }

    .final-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease forwards;
    }

    .final-screen.show {
      display: flex;
    }

    .final-text {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1.2;
      text-shadow: 0 6px 22px rgba(0,0,0,0.28);
      animation: popBounce 0.7s ease;
      padding: 0 10px;
    }

    .emoji-line {
      margin-top: 14px;
      font-size: clamp(2rem, 6vw, 3rem);
      animation: floaty 1.4s ease-in-out infinite;
    }

    @keyframes popBounce {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .confetti {
      position: fixed;
      width: 12px;
      height: 18px;
      top: -20px;
      opacity: 0.95;
      border-radius: 4px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 9999;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.95;
      }
    }

    .small-note {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0.9;
      background: rgba(0,0,0,0.16);
      padding: 8px 14px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    @media (max-width: 600px) {
      .container {
        min-height: 420px;
        padding: 26px 16px;
      }

      .buttons-zone {
        height: 220px;
      }

      .btn {
        width: 128px;
        height: 52px;
        font-size: 1rem;
      }

      #yesBtn {
        left: calc(50% - 140px);
        top: 84px;
      }

      #noBtn {
        left: calc(50% + 12px);
        top: 84px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <div id="questionArea">
      <h1>Are you gay? 😏</h1>
      <div class="subtitle">Be honest bro 😈</div>

      <div class="buttons-zone" id="buttonsZone">
        <button class="btn" id="yesBtn">Yes</button>
        <button class="btn" id="noBtn">No</button>
      </div>
    </div>

    <div class="final-screen" id="finalScreen">
      <div class="final-text">Finally you confirmed by yourself 😭😂</div>
      <div class="emoji-line">😈🔥😂</div>
    </div>
  </div>

  <div class="small-note">Try clicking “No” if you can 😭</div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const buttonsZone = document.getElementById("buttonsZone");
    const questionArea = document.getElementById("questionArea");
    const finalScreen = document.getElementById("finalScreen");

    let isMoving = false;
    let lastMoveTime = 0;

    function getRect(el) {
      return el.getBoundingClientRect();
    }

    function overlap(r1, r2, padding = 12) {
      return !(
        r1.right + padding < r2.left ||
        r1.left > r2.right + padding ||
        r1.bottom + padding < r2.top ||
        r1.top > r2.bottom + padding
      );
    }

    function moveNoButton() {
      const now = Date.now();
      if (isMoving || now - lastMoveTime < 90) return;

      isMoving = true;
      lastMoveTime = now;

      const zoneRect = buttonsZone.getBoundingClientRect();
      const yesRect = getRect(yesBtn);

      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;

      let tries = 0;
      let placed = false;

      while (tries < 80 && !placed) {
        const x = Math.random() * Math.max(10, zoneRect.width - btnW);
        const y = Math.random() * Math.max(10, zoneRect.height - btnH);

        const newRect = {
          left: zoneRect.left + x,
          top: zoneRect.top + y,
          right: zoneRect.left + x + btnW,
          bottom: zoneRect.top + y + btnH
        };

        if (!overlap(newRect, yesRect, 20)) {
          noBtn.style.left = `${x}px`;
          noBtn.style.top = `${y}px`;
          noBtn.classList.remove("shake");
          void noBtn.offsetWidth;
          noBtn.classList.add("shake");
          placed = true;
        }

        tries++;
      }

      setTimeout(() => {
        isMoving = false;
      }, 100);
    }

    function pointerNearNoButton(clientX, clientY) {
      const rect = noBtn.getBoundingClientRect();
      const padding = window.innerWidth < 768 ? 90 : 70;
      return (
        clientX > rect.left - padding &&
        clientX < rect.right + padding &&
        clientY > rect.top - padding &&
        clientY < rect.bottom + padding
      );
    }

    document.addEventListener("mousemove", (e) => {
      if (pointerNearNoButton(e.clientX, e.clientY)) {
        moveNoButton();
      }
    });

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("mousedown", (e) => {
      e.preventDefault();
      moveNoButton();
    });
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    // Mobile touch handling
    document.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      if (pointerNearNoButton(touch.clientX, touch.clientY)) {
        moveNoButton();
      }
    }, { passive: true });

    document.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      if (pointerNearNoButton(touch.clientX, touch.clientY)) {
        moveNoButton();
      }
    }, { passive: true });

    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    yesBtn.addEventListener("click", () => {
      questionArea.classList.add("hidden");
      finalScreen.classList.add("show");
      launchConfetti();
    });

    function launchConfetti() {
      const pieces = 80;
      const colors = [
        "#ff4d6d", "#ffd166", "#06d6a0", "#118ab2", "#f72585", "#ffffff", "#ff9f1c"
      ];

      for (let i = 0; i < pieces; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = colors[Math.floor(Math.random() * colors.length)];
        conf.style.width = (8 + Math.random() * 8) + "px";
        conf.style.height = (12 + Math.random() * 14) + "px";
        conf.style.animationDuration = (2.5 + Math.random() * 2.5) + "s";
        conf.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(conf);

        setTimeout(() => {
          conf.remove();
        }, 5500);
      }
    }

    // Reposition No button on resize to keep it safe
    window.addEventListener("resize", () => {
      const zoneRect = buttonsZone.getBoundingClientRect();
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;

      let left = parseFloat(noBtn.style.left || 0);
      let top = parseFloat(noBtn.style.top || 0);

      if (left + btnW > zoneRect.width) left = Math.max(0, zoneRect.width - btnW);
      if (top + btnH > zoneRect.height) top = Math.max(0, zoneRect.height - btnH);

      noBtn.style.left = `${left}px`;
      noBtn.style.top = `${top}px`;
    });
  </script>
</body>
</html>
